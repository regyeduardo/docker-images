server {
    listen 80;
    server_name localhost;

    # Aumenta o limite do corpo da requisição para uploads de até 2GB
    # (o padrão do nginx é 1MB, o que causa erro 413 para arquivos grandes)
    client_max_body_size 2G;

    location / {
        root /app/web;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Desabilita buffering do corpo da requisição para uploads grandes
        # (evita que o nginx escreva em disco antes de enviar ao backend)
        proxy_request_buffering off;

        # Timeouts longos para processamento de vídeo (até 10 min)
        proxy_connect_timeout 75s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
